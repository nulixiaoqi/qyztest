<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线敲木鱼积攒功德</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-size: 200% 200%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        @keyframes gradientShift {
            0%, 100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 90%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 2rem 2rem 2.5rem 2rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .title {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #8B4513, #A0522D, #CD853F);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            font-weight: bold;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #A0522D;
            margin-bottom: 1.5rem;
            opacity: 0.9;
            font-style: italic;
        }

        .fish-container {
            position: relative;
            margin: 0;
            display: inline-block;
        }

        .fish {
            width: 200px;
            height: 200px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="%23DEB887">\n        <path d="M256 32c132.5 0 240 107.5 240 240S388.5 512 256 512 16 404.5 16 272 123.5 32 256 32zm0 48c-106.0 0-192 86.0-192 192s86.0 192 192 192 192-86.0 192-192-86.0-192-192-192zm-48 80c8.84 0 16 7.16 16 16v80c0 8.84-7.16 16-16 16s-16-7.16-16-16v-80c0-8.84 7.16-16 16-16zm96 0c8.84 0 16 7.16 16 16v80c0 8.84-7.16 16-16 16s-16-7.16-16-16v-80c0-8.84 7.16-16 16-16z"/>\n        </svg>') no-repeat center;
            background-size: contain;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(139, 69, 19, 0.4), inset 0 -5px 20px rgba(0,0,0,0.1);
            border: 4px solid #DEB887;
            position: relative;
        }

        .fish::after {
            content: '';
            position: absolute;
            top: 10%;
            left: 15%;
            width: 25%;
            height: 15%;
            background: radial-gradient(ellipse, rgba(255,255,255,0.4), transparent);
            border-radius: 50%;
            filter: blur(2px);
        }

        .fish:hover {
            transform: scale(1.08) rotate(-3deg);
            box-shadow: 0 15px 40px rgba(139, 69, 19, 0.5), inset 0 -5px 20px rgba(0,0,0,0.15);
            border-color: #FFD700;
        }

        .fish:active {
            transform: scale(0.95);
        }

        .fish.clicked {
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(1.1) rotate(-5deg); }
            50% { transform: scale(1.1) rotate(5deg); }
            75% { transform: scale(1.1) rotate(-5deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-100px) scale(0.5);
            }
        }

        .floating-text {
            position: absolute;
            color: #FF6B35;
            font-weight: bold;
            font-size: 1.2rem;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
        }

        .stats {
            background: linear-gradient(135deg, #FFF8DC 0%, #FFE4B5 100%);
            border-radius: 25px;
            padding: 2rem;
            margin-top: 1.5rem;
            box-shadow: 0 8px 25px rgba(139, 69, 19, 0.15);
            border: 2px solid rgba(222, 184, 135, 0.5);
        }

        .merit-count {
            font-size: 3rem;
            font-weight: bold;
            background: linear-gradient(135deg, #8B4513, #CD853F, #FF6347);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 30px rgba(255, 99, 71, 0.3);
        }

        .merit-label {
            font-size: 1rem;
            color: #A0522D;
            opacity: 0.9;
            letter-spacing: 2px;
        }

        .sound-btn {
            background: linear-gradient(135deg, #DEB887, #CD853F);
            color: #5D3A1A;
            border: none;
            padding: 12px 22px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: bold;
            margin: 0 5px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(222, 184, 135, 0.4);
        }

        .sound-btn:hover {
            background: linear-gradient(135deg, #CD853F, #DEB887);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(222, 184, 135, 0.5);
        }

        .sound-btn.active {
            background: linear-gradient(135deg, #8B4513, #A0522D);
            color: white;
            box-shadow: 0 4px 15px rgba(139, 69, 19, 0.4);
        }

        .instructions {
            margin-top: 2rem;
            font-size: 0.95rem;
            color: #666;
            line-height: 1.8;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            background: rgba(245, 245, 245, 0.5);
            padding: 1rem 1.5rem;
            border-radius: 15px;
        }

        .instructions p {
            margin: 0.5rem 0;
        }

        .achievement {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #8B4513;
            padding: 1rem;
            border-radius: 15px;
            margin-top: 1rem;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: none;
        }

        .achievement.show {
            display: block;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        /* 成就面板样式 - 嵌入页面 */
        .achievement-section {
            width: 25%;
            max-width: 150px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 10px;
            padding: 0;
            box-shadow: 0 3px 10px rgba(139, 69, 19, 0.12);
            overflow: hidden;
            border: 1px solid rgba(222, 184, 135, 0.3);
        }

        .achievement-section-header {
            background: linear-gradient(135deg, #8B4513, #A0522D, #8B4513);
            background-size: 200% 100%;
            color: white;
            padding: 0.4rem;
            text-align: center;
            font-size: 0.8rem;
            font-weight: bold;
            position: relative;
            overflow: hidden;
        }

        .achievement-section-header::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            animation: headerShimmer 3s infinite;
        }

        @keyframes headerShimmer {
            100% {
                left: 100%;
            }
        }

        .achievement-section-body {
            padding: 0.5rem;
            max-height: 150px;
            overflow-y: auto;
            background: linear-gradient(180deg, #fffcf8 0%, #fff9f0 100%);
        }

        /* 成就区块滚动条样式 */
        .achievement-section-body::-webkit-scrollbar {
            width: 6px;
        }

        .achievement-section-body::-webkit-scrollbar-track {
            background: transparent;
        }

        .achievement-section-body::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #DEB887, #8B4513);
            border-radius: 10px;
        }

        .achievement-section-body::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #CD853F, #A0522D);
        }

        .achievement-item {
            font-size: 0.65rem;
            padding: 0.25rem 0.15rem;
            transition: all 0.3s ease;
            border-bottom: 1px dashed rgba(222, 184, 135, 0.15);
        }

        .achievement-item:last-child {
            border-bottom: none;
        }

        .achievement-item.locked {
            color: #bbb;
            opacity: 0.7;
        }

        .achievement-section-title {
            font-size: 1rem;
            font-weight: bold;
            color: #8B4513;
            margin-bottom: 0.8rem;
            text-align: center;
            border-bottom: 2px solid #DEB887;
            padding-bottom: 0.5rem;
        }

        .achievement-item {
            font-size: 0.85rem;
            padding: 0.4rem 0;
            transition: all 0.3s ease;
        }

        .achievement-item.locked {
            color: #999;
        }

        .achievement-blur {
            display: inline-block;
            min-width: 60px;
            color: transparent;
            background: linear-gradient(90deg, #e8e8e8 0%, #d5d5d5 50%, #e8e8e8 100%);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            filter: blur(5px);
            animation: blurShimmer 2.5s infinite ease-in-out;
        }

        @keyframes blurShimmer {
            0%, 100% {
                background-position: -200% 0;
                filter: blur(5px);
            }
            50% {
                background-position: 200% 0;
                filter: blur(3px);
            }
        }

        @keyframes blurShimmer {
            0% {
                background-position: -200% 0;
            }
            100% {
                background-position: 200% 0;
            }
        }

        .achievement-item.unlocked {
            color: #8B0000;
            text-shadow: 0 0 4px rgba(255, 215, 0, 0.4);
            font-weight: bold;
            background: linear-gradient(90deg, #8B0000, #B22222, #CD5C5C, #B22222, #8B0000);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: achievementGlow 3s ease-in-out infinite;
        }

        @keyframes achievementGlow {
            0%, 100% {
                background-position: 0% 50%;
                text-shadow: 0 0 4px rgba(255, 215, 0, 0.4), 0 0 8px rgba(255, 215, 0, 0.2);
            }
            50% {
                background-position: 100% 50%;
                text-shadow: 0 0 6px rgba(255, 215, 0, 0.6), 0 0 12px rgba(255, 215, 0, 0.3);
            }
        }

        @keyframes goldenGlow {
            0%, 100% {
                text-shadow: 0 0 5px #FFD700, 0 0 10px #FFA500, 0 0 15px #FF8C00;
                opacity: 1;
            }
            50% {
                text-shadow: 0 0 8px #FFD700, 0 0 16px #FFA500, 0 0 20px #FF8C00;
                opacity: 0.9;
            }
        }

        .achievement-requirement {
            font-size: 0.75rem;
            color: #bbb;
            margin-left: 0.3rem;
        }

        .achievement-item.unlocked .achievement-requirement {
            color: #A52A2A;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #DEB887;
            border-radius: 50%;
            animation: particleFloat 6s infinite linear;
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* 平板电脑响应式 (601px - 1024px) */
@media (min-width: 601px) and (max-width: 1024px) {
            .container {
                max-width: 500px;
                padding: 2rem 1.5rem;
            }

            .fish {
                width: 160px;
                height: 160px;
            }

            .achievement-section,
            .auto-merit-section {
                max-width: 120px;
            }
        }

/* 大屏 PC 响应式 (1400px+) */
@media (min-width: 1400px) {
            .container {
                max-width: 700px;
                padding: 3rem 2.5rem;
            }

            .fish {
                width: 240px;
                height: 240px;
            }

            .title {
                font-size: 3rem;
            }

            .merit-count {
                font-size: 3.5rem;
            }

            .achievement-section,
            .auto-merit-section {
                max-width: 180px;
            }
        }

/* 超大屏 PC 响应式 (1920px+) */
@media (min-width: 1920px) {
            .container {
                max-width: 800px;
                padding: 4rem 3rem;
            }

            .fish {
                width: 280px;
                height: 280px;
            }

            .title {
                font-size: 3.5rem;
            }

            .merit-count {
                font-size: 4rem;
            }

            .achievement-section,
            .auto-merit-section {
                max-width: 200px;
            }
        }

/* 手机端响应式 (最大 600px) */
@media (max-width: 600px) {
            .title {
                font-size: 1.8rem;
            }

            .subtitle {
                font-size: 0.95rem;
            }

            .fish {
                width: 150px;
                height: 150px;
            }

            .merit-count {
                font-size: 2.2rem;
            }

            .container {
                padding: 1.5rem 1rem;
                width: 95%;
                border-radius: 20px;
            }

            .main-content-wrapper {
                flex-direction: column;
                align-items: center;
            }

            .achievement-section,
            .auto-merit-section {
                max-width: 100%;
                width: 80%;
            }

            .achievement-section-header,
            .auto-merit-section-header {
                padding: 0.7rem;
                font-size: 0.9rem;
            }

            .achievement-section-body {
                padding: 0.7rem;
            }

            .achievement-item {
                font-size: 0.75rem;
                padding: 0.4rem 0.2rem;
            }

            .auto-merit-card {
                padding: 0.6rem 0.7rem;
            }

            .auto-merit-speed {
                font-size: 0.75rem;
            }

            .auto-merit-price {
                font-size: 0.65rem;
            }

            .auto-merit-status {
                font-size: 0.6rem;
                padding: 2px 6px;
            }

            .auto-merit-controls {
                flex-wrap: wrap;
            }

            .auto-merit-controls button {
                padding: 10px 18px;
                font-size: 0.85rem;
                width: 100%;
                max-width: 280px;
            }

            .sound-btn {
                padding: 10px 16px;
                font-size: 0.85rem;
                margin: 5px 3px;
            }

            .instructions {
                font-size: 0.85rem;
                padding: 0.8rem 1rem;
            }

            /* 隐藏粒子效果提升性能 */
            .particles {
                display: none;
            }
        }

/* 超小屏幕 (最大 375px) */
@media (max-width: 375px) {
            .title {
                font-size: 1.5rem;
            }

            .fish {
                width: 120px;
                height: 120px;
            }

            .merit-count {
                font-size: 1.8rem;
            }

            .achievement-section,
            .auto-merit-section {
                max-width: 100%;
                width: 90%;
            }

            .achievement-item {
                font-size: 0.7rem;
            }
        }

/* PC 端隐藏自动功德控制按钮（因为面板可点击） */
@media (min-width: 1025px) {
            .auto-merit-controls {
                display: none;
            }
        }

        /* 成就和自动功德区块美化 */
        .achievement-section,
        .auto-merit-section {
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .achievement-section:hover,
        .auto-merit-section:hover {
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        }

        .auto-merit-cards {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .auto-merit-card {
            background: linear-gradient(135deg, #fafefb 0%, #f0f8f0 100%);
            border: 1px solid #d0e8d0;
            border-radius: 6px;
            padding: 0.35rem 0.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .auto-merit-card:hover {
            background: linear-gradient(135deg, #f0fff0 0%, #e8f8e8 100%);
            border-color: #90EE90;
            transform: translateX(2px);
            box-shadow: 0 1px 4px rgba(34, 139, 34, 0.1);
        }

        .auto-merit-card.active {
            background: linear-gradient(135deg, #FFF8DC 0%, #FFE4B5 100%);
            border-color: #FFD700;
            box-shadow: 0 1px 5px rgba(255, 215, 0, 0.25);
        }

        .auto-merit-card.active:hover {
            transform: translateX(2px) scale(1.01);
            box-shadow: 0 2px 6px rgba(255, 215, 0, 0.35);
        }

        .auto-merit-info {
            text-align: left;
            flex: 1;
        }

        .auto-merit-speed {
            font-size: 0.65rem;
            color: #8B4513;
            font-weight: bold;
        }

        .auto-merit-price {
            font-size: 0.55rem;
            color: #A0522D;
            margin-top: 0.05rem;
        }

        .auto-merit-status {
            font-size: 0.55rem;
            padding: 1px 4px;
            border-radius: 8px;
            font-weight: bold;
            white-space: nowrap;
        }

        .auto-merit-status.active {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #8B4513;
        }

        .auto-merit-status.inactive {
            background: #e8e8e8;
            color: #888;
        }

        .auto-merit-timer {
            margin-top: 0.3rem;
            font-size: 0.6rem;
            color: #228B22;
            text-align: center;
            padding: 0.25rem;
            background: linear-gradient(135deg, #f0fff0 0%, #e8f8e8 100%);
            border-radius: 6px;
            border: 1px solid #90EE90;
            font-weight: bold;
        }

        .auto-merit-running {
            color: #228B22;
            font-weight: bold;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #ffffff 0%, #fff9f5 100%);
            border-radius: 25px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 215, 0, 0.3);
        }

        .modal-title {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #8B4513, #CD853F);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            font-weight: bold;
        }

        .modal-text {
            font-size: 1rem;
            color: #555;
            margin-bottom: 1.5rem;
            line-height: 1.8;
        }

        .modal-btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .modal-btn {
            padding: 12px 28px;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .modal-btn-confirm {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #5D3A1A;
        }

        .modal-btn-confirm:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.4);
        }

        .modal-btn-cancel {
            background: linear-gradient(135deg, #e0e0e0, #c0c0c0);
            color: #555;
        }

        .modal-btn-cancel:hover {
            background: linear-gradient(135deg, #d0d0d0, #b0b0b0);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        }

        .auto-merit-controls {
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .auto-merit-controls button {
            padding: 14px 28px;
            font-size: 1rem;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
        }

        .auto-merit-controls button.running {
            background: linear-gradient(135deg, #228B22, #32CD32, #228B22);
            background-size: 200% 100%;
            color: white;
            box-shadow: 0 4px 20px rgba(34, 139, 34, 0.5);
            animation: buttonGlow 2s ease-in-out infinite;
        }

        .auto-merit-controls button.running:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(34, 139, 34, 0.6);
        }

        @keyframes buttonGlow {
            0%, 100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        .auto-merit-controls button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 自动功德区块样式 - 嵌入页面 */
        /* 三元素横向排列容器 */
        .main-content-wrapper {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 1rem;
            margin: 1rem auto;
        }

        .auto-merit-section {
            width: 25%;
            max-width: 150px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 10px;
            padding: 0;
            box-shadow: 0 3px 10px rgba(34, 139, 34, 0.12);
            overflow: hidden;
            border: 1px solid rgba(144, 238, 144, 0.3);
        }

        .auto-merit-section-header {
            background: linear-gradient(135deg, #228B22, #32CD32, #228B22);
            background-size: 200% 100%;
            color: white;
            padding: 0.4rem;
            text-align: center;
            font-size: 0.8rem;
            font-weight: bold;
            position: relative;
            overflow: hidden;
        }

        .auto-merit-section-header::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            animation: headerShimmer 3s infinite;
        }

        .auto-merit-section-body {
            padding: 0.5rem;
            background: linear-gradient(180deg, #f8fff8 0%, #f0fff0 100%);
        }

        /* 自动功德区块滚动条样式 */
        .auto-merit-section-body::-webkit-scrollbar {
            width: 5px;
        }

        .auto-merit-section-body::-webkit-scrollbar-track {
            background: transparent;
        }

        .auto-merit-section-body::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #90EE90, #228B22);
            border-radius: 8px;
        }

        .auto-merit-section-body::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #98FB98, #32CD32);
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="container">
        <h1 class="title">敲木鱼积攒功德</h1>
        <p class="subtitle">诚心一敲，功德 +1</p>

        <!-- 三元素横向排列 -->
        <div class="main-content-wrapper">
            <!-- 自动功德区块 -->
            <div class="auto-merit-section" id="autoMeritSection">
                <div class="auto-merit-section-header">⚡ 自动攒功德</div>
                <div class="auto-merit-section-body">
                    <div class="auto-merit-cards">
                        <div class="auto-merit-card" id="tier1" onclick="selectTier(1)">
                            <div class="auto-merit-info">
                                <div class="auto-merit-speed">🐢 2 次/秒</div>
                                <div class="auto-merit-price">￥5/月</div>
                            </div>
                            <div class="auto-merit-status inactive" id="status1">未开通</div>
                        </div>
                        <div class="auto-merit-card" id="tier2" onclick="selectTier(2)">
                            <div class="auto-merit-info">
                                <div class="auto-merit-speed">🐇 5 次/秒</div>
                                <div class="auto-merit-price">￥10/月</div>
                            </div>
                            <div class="auto-merit-status inactive" id="status2">未开通</div>
                        </div>
                        <div class="auto-merit-card" id="tier3" onclick="selectTier(3)">
                            <div class="auto-merit-info">
                                <div class="auto-merit-speed">🚀 10 次/秒</div>
                                <div class="auto-merit-price">￥15/月</div>
                            </div>
                            <div class="auto-merit-status inactive" id="status3">未开通</div>
                        </div>
                    </div>
                    <div class="auto-merit-timer" id="autoMeritTimer"></div>
                </div>
            </div>

            <!-- 木鱼 -->
            <div class="fish-container" id="fishContainer">
                <div class="fish" id="fish"></div>
            </div>

            <!-- 成就一览区块 -->
            <div class="achievement-section" id="achievementSection">
                <div class="achievement-section-header">🏆 成就一览</div>
                <div class="achievement-section-body" id="achievementList"></div>
            </div>
        </div>

        <!-- 自动功德控制按钮 -->
        <div class="auto-merit-controls">
            <button class="sound-btn" id="autoMeritBtn" onclick="toggleAutoMerit()">▶️ 开启自动攒功德</button>
        </div>

        <div class="controls" style="margin-top: 0;">
            <button class="sound-btn" id="soundBtn" onclick="toggleSound()">🔊 音效开关</button>
            <button class="sound-btn" onclick="resetMerit()">🔄 清零功德</button>
        </div>

        <div class="stats">
            <div class="merit-count" id="meritCount">0</div>
            <div class="merit-label">累计功德</div>
        </div>

        <div class="achievement" id="achievement">
            🎊 功德无量！恭喜获得成就：
            <span id="achievementText"></span>
        </div>

        <div class="instructions">
            <p>🐟 点击木鱼即可积攒功德</p>
            <p>🔔 每敲一次木鱼都会产生功德数值</p>
            <p>📈 达到特定功德时会解锁成就</p>
            <p>💝 积善之家必有余庆，功德无量！</p>
        </div>
    </div>

    <!-- 支付确认弹窗 -->
    <div class="modal-overlay" id="paymentModal">
        <div class="modal-content">
            <div class="modal-title">💳 确认开通</div>
            <div class="modal-text" id="paymentText"></div>
            <div class="modal-btn-group">
                <button class="modal-btn modal-btn-cancel" onclick="closePaymentModal()">取消</button>
                <button class="modal-btn modal-btn-confirm" onclick="confirmPayment()">确认支付</button>
            </div>
        </div>
    </div>

    <script>
        let meritCount = 0;
        let soundEnabled = true;

        // 自动功德相关变量
        let autoMeritEnabled = false;
        let autoMeritSpeed = 0; // 每秒次数
        let autoMeritInterval = null;
        let selectedTier = null;
        let subscriptionExpire = null;

        const tierConfig = {
            1: { speed: 2, price: 5, name: '基础版' },
            2: { speed: 5, price: 10, name: '进阶版' },
            3: { speed: 10, price: 15, name: '至尊版' }
        };

        const achievementLevels = {
            1: "初入佛门",
            10: "小试牛刀",
            33: "虔诚信徒",
            50: "心地善良",
            100: "百日修行",
            108: "精进修行",
            200: "双百功德",
            365: "功德圆满",
            500: "五百罗汉",
            999: "金刚菩提",
            1314: "一生一世",
            2026: "佛光普照",
            5000: "功德无量",
            8888: "福泽绵长",
            10000: "万德庄严"
        };

        // 渲染成就列表
        function renderAchievementList() {
            const list = document.getElementById('achievementList');
            const achievements = Object.entries(achievementLevels).sort((a, b) => a[0] - b[0]);

            list.innerHTML = achievements.map(([count, name]) => {
                const unlocked = meritCount >= count;
                if (unlocked) {
                    return `<div class="achievement-item ${unlocked ? 'unlocked' : 'locked'}">
                        ✨ ${name}
                    </div>`;
                } else {
                    // 未达到成就要求时，隐藏名称，显示模糊效果
                    return `<div class="achievement-item locked">
                        🔒 <span class="achievement-blur">???</span>
                    </div>`;
                }
            }).join('');
        }

        // 更新成就状态
        function updateAchievementStatus() {
            const items = document.querySelectorAll('.achievement-item');
            const achievements = Object.entries(achievementLevels).sort((a, b) => a[0] - b[0]);

            items.forEach((item, index) => {
                const [required, name] = achievements[index];
                const unlocked = meritCount >= required;

                if (unlocked && item.classList.contains('locked')) {
                    // 解锁新成就
                    item.classList.remove('locked');
                    item.classList.add('unlocked');
                    item.innerHTML = `✨ ${name}`;
                }
            });
        }

        // 音效
        function playSound() {
            if (!soundEnabled) return;

            const context = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = context.createOscillator();
            const gainNode = context.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(context.destination);

            oscillator.frequency.setValueAtTime(800, context.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(400, context.currentTime + 0.1);

            gainNode.gain.setValueAtTime(0.1, context.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.1);

            oscillator.type = 'sine';
            oscillator.start(context.currentTime);
            oscillator.stop(context.currentTime + 0.1);
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            const btn = document.getElementById('soundBtn');
            if (soundEnabled) {
                btn.textContent = '🔊 音效开关';
                btn.classList.add('active');
            } else {
                btn.textContent = '🔇 音效开关';
                btn.classList.remove('active');
            }
        }

        function createFloatingText(x, y) {
            const text = document.createElement('div');
            text.className = 'floating-text';
            text.textContent = '+1功德';

            const rect = document.getElementById('fish').getBoundingClientRect();
            text.style.left = rect.left + rect.width / 2 - 20 + 'px';
            text.style.top = rect.top + 'px';

            document.body.appendChild(text);

            setTimeout(() => {
                text.remove();
            }, 1000);
        }

        function createParticles() {
            for (let i = 0; i < 5; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 2 + 's';
                particle.style.animationDuration = (Math.random() * 3 + 3) + 's';
                document.getElementById('particles').appendChild(particle);

                setTimeout(() => {
                    particle.remove();
                }, 6000);
            }
        }

        function checkAchievements() {
            const achievements = Object.keys(achievementLevels).map(Number).sort((a, b) => a - b);
            for (let level of achievements) {
                if (meritCount === level) {
                    showAchievement(achievementLevels[level]);
                    break;
                }
            }
            updateAchievementStatus();
        }

        function showAchievement(text) {
            const achievement = document.getElementById('achievement');
            const achievementText = document.getElementById('achievementText');
            achievementText.textContent = text;
            achievement.classList.add('show');

            setTimeout(() => {
                achievement.classList.remove('show');
            }, 3000);
        }

        function saveMerit() {
            localStorage.setItem('meritCount', meritCount.toString());
        }

        function loadMerit() {
            const saved = localStorage.getItem('meritCount');
            if (saved) {
                meritCount = parseInt(saved);
                document.getElementById('meritCount').textContent = meritCount;
                checkAchievements();
            }
        }

        function resetMerit() {
            if (confirm('确定要清零所有功德吗？此操作不可撤销！')) {
                meritCount = 0;
                document.getElementById('meritCount').textContent = 0;
                saveMerit();
            }
        }

        document.getElementById('fish').addEventListener('click', function(e) {
            this.classList.add('clicked');

            setTimeout(() => {
                this.classList.remove('clicked');
            }, 500);

            meritCount++;
            document.getElementById('meritCount').textContent = meritCount;

            createFloatingText();
            playSound();
            createParticles();
            checkAchievements();
            saveMerit();
        });

        // 键盘空格键敲击
        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space') {
                e.preventDefault();
                document.getElementById('fish').click();
            }
        });

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadMerit();
            toggleSound(); // 初始化音效状态
            renderAchievementList(); // 渲染成就列表
        });

        // 定期清除老的粒子
        setInterval(() => {
            const particles = document.querySelectorAll('.particle');
            if (particles.length > 20) {
                for (let i = particles.length - 1; i >= 20; i--) {
                    particles[i].remove();
                }
            }
        }, 10000);

        // ============ 自动功德功能 ============

        // 加载订阅状态
        function loadSubscription() {
            const savedExpire = localStorage.getItem('subscriptionExpire');
            const savedTier = localStorage.getItem('subscriptionTier');

            if (savedExpire && savedTier) {
                subscriptionExpire = parseInt(savedExpire);
                selectedTier = parseInt(savedTier);

                const now = Date.now();
                if (subscriptionExpire > now) {
                    // 订阅仍在有效期内
                    autoMeritSpeed = tierConfig[selectedTier].speed;
                    updateTierUI();
                    updateTimerDisplay();
                    // 不自动启动，等待用户点击开启按钮
                } else {
                    // 订阅已过期
                    clearSubscription();
                }
            }
            updateTierUI();
        }

        // 清除订阅
        function clearSubscription() {
            subscriptionExpire = null;
            selectedTier = null;
            autoMeritEnabled = false;
            autoMeritSpeed = 0;
            localStorage.removeItem('subscriptionExpire');
            localStorage.removeItem('subscriptionTier');
            stopAutoMerit();
            updateTierUI();
        }

        // 选择套餐
        function selectTier(tier) {
            if (selectedTier === tier && autoMeritEnabled) {
                // 当前选中的套餐，且已开通，点击关闭
                if (confirm('确定要关闭自动攒功德吗？')) {
                    clearSubscription();
                }
                return;
            }

            selectedTier = tier;
            const config = tierConfig[tier];

            // 显示支付确认弹窗
            const modal = document.getElementById('paymentModal');
            const text = document.getElementById('paymentText');
            text.innerHTML = `您选择开通 <b>${config.name}</b><br>
                价格：<b style="color: #FF6B35;">￥${config.price}/月</b><br>
                速度：<b>${config.speed} 次/秒</b><br><br>
                <span style="font-size: 0.85rem; color: #999;">（模拟支付，点击确认将直接开通）</span>`;
            modal.classList.add('show');
        }

        // 关闭支付弹窗
        function closePaymentModal() {
            const modal = document.getElementById('paymentModal');
            modal.classList.remove('show');
        }

        // 确认支付
        function confirmPayment() {
            if (!selectedTier) return;

            const config = tierConfig[selectedTier];

            // 设置订阅过期时间（30 天）
            subscriptionExpire = Date.now() + (30 * 24 * 60 * 60 * 1000);

            // 保存到 localStorage
            localStorage.setItem('subscriptionExpire', subscriptionExpire.toString());
            localStorage.setItem('subscriptionTier', selectedTier.toString());

            // 更新 UI
            autoMeritSpeed = config.speed;
            updateTierUI();
            updateTimerDisplay();

            closePaymentModal();

            // 显示开通成功提示
            alert(`✅ 开通成功！\n${config.name}：${config.speed} 次/秒\n有效期：30 天`);
        }

        // 更新套餐 UI 状态
        function updateTierUI() {
            for (let i = 1; i <= 3; i++) {
                const card = document.getElementById(`tier${i}`);
                const status = document.getElementById(`status${i}`);

                if (selectedTier === i && subscriptionExpire) {
                    card.classList.add('active');
                    if (autoMeritEnabled) {
                        status.textContent = '运行中';
                    } else {
                        status.textContent = '已开通';
                    }
                    status.classList.remove('inactive');
                    status.classList.add('active');
                } else {
                    card.classList.remove('active');
                    card.classList.remove('disabled');
                    status.textContent = '未开通';
                    status.classList.remove('active');
                    status.classList.add('inactive');
                }
            }
        }

        // 更新倒计时显示
        function updateTimerDisplay() {
            const timerDiv = document.getElementById('autoMeritTimer');

            if (!subscriptionExpire) {
                timerDiv.innerHTML = '';
                return;
            }

            const now = Date.now();
            const remaining = subscriptionExpire - now;

            if (remaining <= 0) {
                clearSubscription();
                timerDiv.innerHTML = '<span style="color: #FF6B35;">⚠️ 已过期，请重新开通</span>';
                return;
            }

            const days = Math.floor(remaining / (24 * 60 * 60 * 1000));
            const hours = Math.floor((remaining % (24 * 60 * 60 * 1000)) / (60 * 60 * 1000));

            if (days > 0) {
                timerDiv.innerHTML = `<span class="auto-merit-running">⏰ 剩余：${days}天 ${hours}小时</span>`;
            } else {
                const minutes = Math.floor((remaining % (60 * 60 * 1000)) / (60 * 1000));
                timerDiv.innerHTML = `<span class="auto-merit-running">⏰ 剩余：${hours}小时 ${minutes}分</span>`;
            }
        }

        // 开始自动攒功德
        function startAutoMerit() {
            if (autoMeritInterval) {
                clearInterval(autoMeritInterval);
            }

            autoMeritEnabled = true;

            // 根据速度计算间隔（毫秒）
            const interval = 1000 / autoMeritSpeed;

            autoMeritInterval = setInterval(() => {
                if (autoMeritEnabled) {
                    meritCount++;
                    document.getElementById('meritCount').textContent = meritCount;
                    saveMerit();
                    checkAchievements();
                }
            }, interval);

            // 每秒更新一次倒计时
            setInterval(() => {
                updateTimerDisplay();
            }, 1000);
        }

        // 停止自动攒功德
        function stopAutoMerit() {
            if (autoMeritInterval) {
                clearInterval(autoMeritInterval);
                autoMeritInterval = null;
            }
            autoMeritEnabled = false;
            updateTierUI();
        }

        // 切换自动功德开关
        function toggleAutoMerit() {
            if (!selectedTier || !subscriptionExpire) {
                alert('请先开通自动攒功德套餐');
                return;
            }

            const now = Date.now();
            if (subscriptionExpire <= now) {
                alert('订阅已过期，请重新开通');
                clearSubscription();
                return;
            }

            if (autoMeritEnabled) {
                // 正在运行，关闭
                stopAutoMerit();
            } else {
                // 未运行，开启
                startAutoMerit();
            }
            updateAutoMeritButton();
        }

        // 更新自动功德按钮状态
        function updateAutoMeritButton() {
            const btn = document.getElementById('autoMeritBtn');
            if (autoMeritEnabled) {
                btn.textContent = '⏸️ 暂停自动攒功德';
                btn.classList.add('running');
            } else {
                btn.textContent = '▶️ 开启自动攒功德';
                btn.classList.remove('running');
            }
        }

        // 页面加载时恢复订阅状态
        window.addEventListener('DOMContentLoaded', function() {
            loadSubscription();
            updateAutoMeritButton();
        });
    </script>
</body>
</html>
