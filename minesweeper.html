<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扫雷游戏</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-container {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 20px;
            margin: 20px 0;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 10px;
            background-color: #f8f9fa;
            border-radius: 5px;
        }

        .counter {
            background-color: black;
            color: red;
            padding: 5px 10px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 20px;
            min-width: 50px;
            text-align: center;
        }

        .smiley {
            font-size: 40px;
            cursor: pointer;
            user-select: none;
        }

        .smiley:hover {
            transform: scale(1.1);
        }

        #minefield {
            display: inline-block;
            border: 2px solid #333;
            background-color: #ddd;
            user-select: none;
        }

        .row {
            display: flex;
        }

        .cell {
            width: 25px;
            height: 25px;
            border: 1px outset #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            background-color: #ddd;
            position: relative;
        }

        .cell:hover {
            background-color: #bbb;
        }

        .cell.revealed {
            border: 1px inset #999;
            background-color: #bbb;
            cursor: default;
        }

        .cell.flagged {
            background-color: #ffcccc;
            position: relative;
        }

        .cell.flagged::before {
            content: "🚩";
            font-size: 16px;
        }

        .cell.mine {
            background-color: #ff6666;
        }

        .cell.mine::before {
            content: "💣";
            font-size: 16px;
        }

        .cell.exploded {
            background-color: #ff0000;
        }

        .cell.wrong-flag {
            background-color: #ff9999;
            position: relative;
        }

        .cell.wrong-flag::before {
            content: "❌";
            font-size: 16px;
        }

        /* 数字颜色 */
        .num-1 { color: #0000ff; }
        .num-2 { color: #008000; }
        .num-3 { color: #ff0000; }
        .num-4 { color: #800080; }
        .num-5 { color: #800000; }
        .num-6 { color: #008080; }
        .num-7 { color: #000000; }
        .num-8 { color: #808080; }

        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .difficulty-selector {
            display: flex;
            gap: 10px;
        }

        .difficulty-btn {
            padding: 5px 15px;
            border: none;
            border-radius: 5px;
            background-color: #007bff;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        .difficulty-btn:hover {
            background-color: #0056b3;
        }

        .difficulty-btn.active {
            background-color: #28a745;
        }

        .game-over {
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
        }

        .game-over.win {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .game-over.lose {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .instructions {
            margin-top: 20px;
            padding: 10px;
            background-color: #e9ecef;
            border-radius: 5px;
            font-size: 14px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <h1>扫雷游戏</h1>

    <div class="controls">
        <div class="difficulty-selector">
            <button class="difficulty-btn active" data-level="easy">初级 (9×9, 10)</button>
            <button class="difficulty-btn" data-level="medium">中级 (16×16, 40)</button>
            <button class="difficulty-btn" data-level="hard">高级 (16×30, 99)</button>
        </div>
        <button onclick="newGame()">新游戏</button>
    </div>

    <div class="game-container">
        <div class="game-header">
            <div class="counter" id="mineCounter">010</div>
            <div class="smiley" id="smiley" onclick="newGame()">😀</div>
            <div class="counter" id="timeCounter">000</div>
        </div>

        <div id="minefield"></div>

        <div id="gameOver" class="game-over" style="display: none;"></div>
    </div>

    <div class="instructions">
        <strong>游戏说明：</strong><br>
        • 左键点击：翻开格子<br>
        • 右键点击：标记/取消标记地雷<br>
        • 左右键同时点击：快速翻开周围格子（当已标记地雷数等于格子数字时）<br>
        • 数字表示周围8个格子中的地雷数量<br>
        • 避开所有地雷即可获胜<br>
    </div>

    <script>
        class Minesweeper {
            constructor() {
                this.difficulties = {
                    easy: { rows: 9, cols: 9, mines: 10 },
                    medium: { rows: 16, cols: 16, mines: 40 },
                    hard: { rows: 16, cols: 30, mines: 99 }
                };

                this.currentDifficulty = 'easy';
                this.rows = this.difficulties[this.currentDifficulty].rows;
                this.cols = this.difficulties[this.currentDifficulty].cols;
                this.totalMines = this.difficulties[this.currentDifficulty].mines;

                this.board = [];
                this.revealed = [];
                this.flagged = [];
                this.gameState = 'playing'; // 'playing', 'won', 'lost'

                this.timer = null;
                this.seconds = 0;

                // 鼠标按键状态跟踪
                this.leftButtonDown = false;
                this.rightButtonDown = false;

                this.init();
            }

            init() {
                this.setupEventListeners();
                this.newGame();
            }

            setupEventListeners() {
                // 难度选择
                document.querySelectorAll('.difficulty-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        this.setDifficulty(e.target.dataset.level);
                    });
                });

                document.addEventListener('contextmenu', (e) => {
                    if (e.target.classList.contains('cell')) {
                        e.preventDefault();
                    }
                });

                // 跟踪鼠标按键状态
                document.addEventListener('mousedown', (e) => {
                    if (e.target.classList.contains('cell')) {
                        if (e.button === 0) this.leftButtonDown = true;
                        if (e.button === 2) this.rightButtonDown = true;

                        // 检测双键同时按下
                        if (this.leftButtonDown && this.rightButtonDown) {
                            this.handleChordClick(e.target);
                        }
                    }
                });

                document.addEventListener('mouseup', (e) => {
                    if (e.button === 0) this.leftButtonDown = false;
                    if (e.button === 2) this.rightButtonDown = false;
                });
            }

            setDifficulty(level) {
                this.currentDifficulty = level;
                this.rows = this.difficulties[level].rows;
                this.cols = this.difficulties[level].cols;
                this.totalMines = this.difficulties[level].mines;

                document.querySelectorAll('.difficulty-btn').forEach(btn => {
                    btn.classList.remove('active');
                });
                document.querySelector(`[data-level="${level}"]`).classList.add('active');

                this.newGame();
            }

            newGame() {
                this.board = [];
                this.revealed = [];
                this.flagged = [];
                this.gameState = 'playing';
                this.seconds = 0;

                this.stopTimer();
                this.createBoard();
                this.renderBoard();
                this.updateMineCounter();
                this.updateTimeCounter();
                this.updateSmiley('😀');
                this.hideGameOver();
            }

            createBoard() {
                // 初始化数组
                for (let row = 0; row < this.rows; row++) {
                    this.board[row] = new Array(this.cols).fill(0);
                    this.revealed[row] = new Array(this.cols).fill(false);
                    this.flagged[row] = new Array(this.cols).fill(false);
                }

                // 随机放置地雷
                let minesPlaced = 0;
                while (minesPlaced < this.totalMines) {
                    const row = Math.floor(Math.random() * this.rows);
                    const col = Math.floor(Math.random() * this.cols);

                    if (this.board[row][col] !== -1) {
                        this.board[row][col] = -1;
                        minesPlaced++;
                    }
                }

                // 计算每个格子的数字
                for (let row = 0; row < this.rows; row++) {
                    for (let col = 0; col < this.cols; col++) {
                        if (this.board[row][col] === -1) continue;

                        let count = 0;
                        for (let dr = -1; dr <= 1; dr++) {
                            for (let dc = -1; dc <= 1; dc++) {
                                if (dr === 0 && dc === 0) continue;

                                const newRow = row + dr;
                                const newCol = col + dc;

                                if (newRow >= 0 && newRow < this.rows &&
                                    newCol >= 0 && newCol < this.cols &&
                                    this.board[newRow][newCol] === -1) {
                                    count++;
                                }
                            }
                        }
                        this.board[row][col] = count;
                    }
                }
            }

            renderBoard() {
                const minefield = document.getElementById('minefield');
                minefield.innerHTML = '';
                minefield.style.gridTemplateColumns = `repeat(${this.cols}, 25px)`;

                for (let row = 0; row < this.rows; row++) {
                    const rowDiv = document.createElement('div');
                    rowDiv.className = 'row';

                    for (let col = 0; col < this.cols; col++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        cell.dataset.row = row;
                        cell.dataset.col = col;

                        cell.addEventListener('click', (e) => this.handleClick(row, col));
                        cell.addEventListener('contextmenu', (e) => {
                            e.preventDefault();
                            this.handleRightClick(row, col);
                        });

                        rowDiv.appendChild(cell);
                    }
                    minefield.appendChild(rowDiv);
                }
            }

            handleClick(row, col) {
                if (this.gameState !== 'playing' || this.revealed[row][col] || this.flagged[row][col]) {
                    return;
                }

                if (!this.timer) {
                    this.startTimer();
                }

                this.revealCell(row, col);
            }

            handleRightClick(row, col) {
                if (this.gameState !== 'playing' || this.revealed[row][col]) {
                    return;
                }

                if (!this.timer) {
                    this.startTimer();
                }

                this.flagged[row][col] = !this.flagged[row][col];
                this.updateCell(row, col);
                this.updateMineCounter();
            }

            handleChordClick(cellElement) {
                const row = parseInt(cellElement.dataset.row);
                const col = parseInt(cellElement.dataset.col);

                // 只有已翻开的格子才能触发双键点击
                if (this.gameState !== 'playing' || !this.revealed[row][col]) {
                    return;
                }

                // 计算周围地雷总数和已标记数量
                const neighbors = [];
                let mineCount = 0;
                let flaggedCount = 0;

                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        if (dr === 0 && dc === 0) continue;

                        const newRow = row + dr;
                        const newCol = col + dc;

                        if (newRow >= 0 && newRow < this.rows && newCol >= 0 && newCol < this.cols) {
                            neighbors.push({ row: newRow, col: newCol });
                            if (this.board[newRow][newCol] === -1) {
                                mineCount++;
                            }
                            if (this.flagged[newRow][newCol]) {
                                flaggedCount++;
                            }
                        }
                    }
                }

                // 只有当标记数量等于格子数字时，才翻开周围未标记的格子
                if (flaggedCount === this.board[row][col] && flaggedCount > 0) {
                    if (!this.timer) {
                        this.startTimer();
                    }

                    for (const neighbor of neighbors) {
                        if (!this.revealed[neighbor.row][neighbor.col] && !this.flagged[neighbor.row][neighbor.col]) {
                            this.revealCell(neighbor.row, neighbor.col);
                        }
                    }
                }
            }

            revealCell(row, col) {
                if (row < 0 || row >= this.rows || col < 0 || col >= this.cols ||
                    this.revealed[row][col] || this.flagged[row][col]) {
                    return;
                }

                this.revealed[row][col] = true;
                this.updateCell(row, col);

                if (this.board[row][col] === -1) {
                    // 踩到地雷，游戏结束
                    this.gameState = 'lost';
                    this.revealAllMines();
                    this.updateSmiley('💀');
                    this.showGameOver(false);
                    this.stopTimer();
                    return;
                }

                if (this.board[row][col] === 0) {
                    // 空白格子，自动展开周围
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            this.revealCell(row + dr, col + dc);
                        }
                    }
                }

                // 检查胜利条件
                if (this.checkWin()) {
                    this.gameState = 'won';
                    this.revealAllMines();
                    this.updateSmiley('😎');
                    this.showGameOver(true);
                    this.stopTimer();
                }
            }

            updateCell(row, col) {
                const cell = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
                if (!cell) return;

                // 重置格子样式
                cell.className = 'cell';
                cell.textContent = '';

                // 已翻开的格子
                if (this.revealed[row][col]) {
                    cell.classList.add('revealed');
                    if (this.board[row][col] === -1) {
                        cell.classList.add('mine');
                    } else if (this.board[row][col] > 0) {
                        cell.textContent = this.board[row][col];
                        cell.classList.add(`num-${this.board[row][col]}`);
                    }
                }
                // 未翻开但已标记的格子
                else if (this.flagged[row][col]) {
                    cell.classList.add('flagged');
                }
                // 未翻开未标记的格子 - 保持默认样式
            }

            revealAllMines() {
                for (let row = 0; row < this.rows; row++) {
                    for (let col = 0; col < this.cols; col++) {
                        const cell = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
                        if (cell) {
                            if (this.board[row][col] === -1) {
                                if (!this.flagged[row][col]) {
                                    cell.className = 'cell';
                                    cell.classList.add('revealed', 'mine');
                                }
                            } else if (this.flagged[row][col]) {
                                cell.className = 'cell';
                                cell.classList.add('revealed', 'wrong-flag');
                            } else if (!this.revealed[row][col]) {
                                cell.className = 'cell';
                                cell.classList.add('revealed');
                            }
                        }
                    }
                }

                // 标记引爆的地雷
                if (this.gameState === 'lost') {
                    // 找到最后点击的地雷
                    for (let row = 0; row < this.rows; row++) {
                        for (let col = 0; col < this.cols; col++) {
                            if (this.board[row][col] === -1 && this.revealed[row][col]) {
                                const cell = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
                                if (cell) {
                                    cell.classList.remove('mine');
                                    cell.classList.add('exploded');
                                }
                                break;
                            }
                        }
                    }
                }
            }

            checkWin() {
                let revealedCount = 0;
                const totalCells = this.rows * this.cols;

                for (let row = 0; row < this.rows; row++) {
                    for (let col = 0; col < this.cols; col++) {
                        if (this.revealed[row][col]) {
                            revealedCount++;
                        }
                    }
                }

                return revealedCount === totalCells - this.totalMines;
            }

            startTimer() {
                this.timer = setInterval(() => {
                    this.seconds++;
                    this.updateTimeCounter();
                }, 1000);
            }

            stopTimer() {
                if (this.timer) {
                    clearInterval(this.timer);
                    this.timer = null;
                }
            }

            updateMineCounter() {
                const flagCount = this.flagged.flat().filter(flag => flag).length;
                const minesLeft = this.totalMines - flagCount;
                document.getElementById('mineCounter').textContent =
                    minesLeft.toString().padStart(3, '0');
            }

            updateTimeCounter() {
                document.getElementById('timeCounter').textContent =
                    this.seconds.toString().padStart(3, '0');
            }

            updateSmiley(face) {
                document.getElementById('smiley').textContent = face;
            }

            showGameOver(won) {
                const gameOver = document.getElementById('gameOver');
                gameOver.style.display = 'block';

                if (won) {
                    gameOver.className = 'game-over win';
                    gameOver.textContent = `恭喜你赢了！用时 ${this.seconds} 秒`;
                } else {
                    gameOver.className = 'game-over lose';
                    gameOver.textContent = '游戏结束！踩到地雷了';
                }
            }

            hideGameOver() {
                document.getElementById('gameOver').style.display = 'none';
            }
        }

        // 全局变量
        let game;

        // 开始游戏
        window.addEventListener('load', () => {
            game = new Minesweeper();
        });

        function newGame() {
            game.newGame();
        }
    </script>
</body>
</html>
